<!DOCTYPE html>
<html lang="en">
<head>
  <title>Todo List</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #333;
      color: #fff;
    }

    #app {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #todo-title {
      font-size: 24px;
      margin-bottom: 20px;
    }

    #todo-bar {
      margin-bottom: 20px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }

    .todo-item span {
      flex-grow: 1;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }
  </style>

  <script src="todo-list.js" defer></script>
</head>

<body>

  <div id="app">
    <h1 id="todo-title">Todo List</h1>
    <button id="changetheme">Change Theme</button>
  </div>

  <div id="todo-bar">
    <input type="text" id="new-todo" placeholder="Add a new todo">
    <button id="add-todo">Add</button>
    <button id="remove-all-todo">Remove All</button>
  </div>

  <div id="todo-list"></div>

  <div id="completed">
    <h2>Completed Todos</h2>
    <div id="completed-todos"></div>
  </div>

</body>
</html>
