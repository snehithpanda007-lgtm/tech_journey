<!DOCTYPE html>
<html>
    <head>
        <title>Flexbox</title>
    </head>
    <body>
        <div style="
            display: flex;
            flex-direction: row;
            ">
            <div style="
                background-color:lightblue;
                ">div 1 text</div>
            <div style="
                background-color:lightpink;
                ">div 2
                <p>text</p></div>
        </div>

        <div style="
            margin-top: 30px;
            display: flex;
            flex-direction: row;
            ">
            <div style="
                background-color:lightblue;
                width: 100px;
                ">100px</div>
            <div style="
                background-color:lightpink;
                flex: 1;
                ">flex: 1</div>
        </div>

        <div style="
            margin-top: 30px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            border-color: gray;
            border-width: 1px;
            border-style: solid;
            height: 80px;
           ">
           <div style="
                background-color:lightblue;
                width: 100px;
                ">flex: 1</div>
            <div style="
                background-color:lightpink;
                width: 100px;
                ">100px</div>
            <div style="
                background-color:lightblue;
                width: 100px;
                ">flex: 2</div>
        </div>

        <div style="
            margin-top: 30px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            border-color: gray;
            border-width: 1px;
            border-style: solid;
            height: 80px;
           ">
           <div style="
                background-color:lightblue;
                width: 100px;
                ">flex: 1</div>
            <div style="
                background-color:lightpink;
                width: 100px;
                ">100px</div>
            <div style="
                background-color:lightblue;
                width: 100px;
                ">flex: 2</div>
        </div>
        
        <div style="
            margin-top: 30px;
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
            border-color: gray;
            border-width: 1px;
            border-style: solid;
            height: 80px;
           ">
           <div style="
                background-color:lightblue;
                width: 100px;
                ">flex: 1</div>
            <div style="
                background-color:lightpink;
                width: 100px;
                ">100px</div>
            <div style="
                background-color:lightblue;
                width: 100px;
                ">flex: 2</div>
        </div>       
    </body>
</html>
